name: Nightly (model-heavy)

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily
  workflow_dispatch:        # manual trigger from Actions tab

env:
  CARGO_TERM_COLOR: always

jobs:
  # Skip the entire workflow if nothing was pushed since the last nightly run.
  check-changes:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    outputs:
      has_changes: ${{ github.event_name == 'workflow_dispatch' || steps.check.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for commits in last 24 hours
        id: check
        run: |
          if git log --since="24 hours ago" --oneline | grep -q .; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No commits in last 24h — skipping nightly."
          fi

  llama-cpp-backend:
    needs: check-changes
    if: needs.check-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FASTRAG_LLAMA_TEST: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: llama-cpp

      - name: Install llama-server
        run: |
          LLAMA_TAG="b8739"
          curl -fsSL "https://github.com/ggml-org/llama.cpp/releases/download/${LLAMA_TAG}/llama-${LLAMA_TAG}-bin-ubuntu-x64.tar.gz" -o llama.tar.gz
          tar xzf llama.tar.gz
          sudo mkdir -p /opt/llama
          sudo cp -a llama-${LLAMA_TAG}/* /opt/llama/
          sudo ln -sf /opt/llama/llama-server /usr/local/bin/llama-server
          echo "LD_LIBRARY_PATH=/opt/llama" >> "$GITHUB_ENV"
          llama-server --version

      - name: Cache GGUF models
        uses: actions/cache@v4
        with:
          path: ~/.cache/fastrag/models
          key: gguf-qwen3-embed-600m-q8-bge-reranker-v2-m3-q8

      - name: Download embedder model (if not cached)
        run: |
          MODEL_DIR="$HOME/.cache/fastrag/models"
          MODEL_FILE="Qwen3-Embedding-0.6B-Q8_0.gguf"
          if [ ! -f "$MODEL_DIR/$MODEL_FILE" ]; then
            mkdir -p "$MODEL_DIR"
            curl -fsSL "https://huggingface.co/Qwen/Qwen3-Embedding-0.6B-GGUF/resolve/main/$MODEL_FILE" -o "$MODEL_DIR/$MODEL_FILE"
          fi

      - name: Download reranker model (if not cached)
        run: |
          MODEL_DIR="$HOME/.cache/fastrag/models"
          MODEL_FILE="bge-reranker-v2-m3-q8_0.gguf"
          if [ ! -f "$MODEL_DIR/$MODEL_FILE" ]; then
            mkdir -p "$MODEL_DIR"
            curl -fsSL "https://huggingface.co/klnstpr/bge-reranker-v2-m3-Q8_0-GGUF/resolve/main/$MODEL_FILE" -o "$MODEL_DIR/$MODEL_FILE"
          fi

      - name: Run tests (including llama-cpp + rerank)
        run: cargo test --workspace --features retrieval,rerank-llama -- --include-ignored

      - name: Clippy (llama-cpp + rerank features)
        run: cargo clippy --workspace --all-targets --features retrieval,rerank-llama -- -D warnings

  rerank-onnx:
    needs: check-changes
    if: needs.check-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FASTRAG_RERANK_TEST: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: rerank-onnx

      - name: Cache ONNX reranker model
        uses: actions/cache@v4
        with:
          path: ~/.cache/fastrag/models/gte-reranker-modernbert-base
          key: onnx-gte-reranker-modernbert-base

      - name: Download ONNX model (if not cached)
        run: |
          MODEL_DIR="$HOME/.cache/fastrag/models/gte-reranker-modernbert-base"
          if [ ! -f "$MODEL_DIR/model.onnx" ] || [ ! -f "$MODEL_DIR/tokenizer.json" ]; then
            mkdir -p "$MODEL_DIR"
            curl -fsSL "https://huggingface.co/Alibaba-NLP/gte-reranker-modernbert-base/resolve/main/onnx/model.onnx" -o "$MODEL_DIR/model.onnx"
            curl -fsSL "https://huggingface.co/Alibaba-NLP/gte-reranker-modernbert-base/resolve/main/tokenizer.json" -o "$MODEL_DIR/tokenizer.json"
          fi

      - name: Run rerank ONNX tests (including ignored)
        run: cargo test -p fastrag-rerank --features onnx -- --include-ignored

      - name: Run rerank e2e test
        run: cargo test -p fastrag-cli --test rerank_onnx_e2e -- --include-ignored
